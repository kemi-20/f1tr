appId: com.f1tr.app
productName: F1 Race Engineer
copyright: MIT
directories:
  buildResources: build
  output: release/${version}
files:
  - out/**/*
  - resources/**/*
  - package.json
  - "!**/*.{map,ts}"
asar: true
win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  icon: build/icon.ico
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: F1 Race Engineer
portable:
  artifactName: ${productName}-${version}-portable.${ext}
