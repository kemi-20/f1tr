name: Build & Package

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Quick checks on every push/PR ──
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Tests
        run: npm test
      - name: Build (vite)
        run: npm run build

  # ── Windows packaging + release ──
  package-windows:
    needs: check
    runs-on: windows-latest
    # Only package on tags, manual, or main pushes (skip PR-only runs to save minutes)
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck

      # electron-builder builds only (publish: never in electron-builder.yml).
      # We control release publishing explicitly so the Release carries exactly the two
      # installer exes — not the win-unpacked dump, blockmap, or latest.yml.
      - name: Build & package Windows
        run: npm run build:win

      - name: List built executables
        shell: pwsh
        run: Get-ChildItem -Recurse release -Filter "*.exe" | Select-Object FullName, Length

      # Upload the NSIS installer + portable exe as CI artifacts (downloadable from the
      # Actions tab on any branch). Recursive glob because filenames contain spaces + version.
      - name: Upload executables
        uses: actions/upload-artifact@v4
        with:
          name: windows-executables
          path: |
            release/**/*.exe
          if-no-files-found: error

      # On a tag, create a clean GitHub Release with ONLY the NSIS installer + portable exe.
      - name: Publish GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="${GITHUB_REF#refs/tags/}"
          # locate the two built exes (names contain spaces + version)
          SETUP=$(find release -name "*Setup*.exe" | head -1)
          PORTABLE=$(find release -name "*portable*.exe" | head -1)
          echo "setup=$SETUP  portable=$PORTABLE"
          gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" --generate-notes \
            "$SETUP" "$PORTABLE"