name: Build & Package

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Quick checks on every push/PR ──
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Tests
        run: npm test
      - name: Build (vite)
        run: npm run build

  # ── Windows packaging (build only, NO release) ──
  # Release is intentional and manual: only when you push a v* tag yourself.
  package-windows:
    needs: check
    runs-on: windows-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      # Build only (--publish never). Release is never created automatically.
      - name: Build & package Windows
        run: npm run build:win
      - name: List built executables
        shell: pwsh
        run: Get-ChildItem -Recurse release -Filter "*.exe" | Select-Object FullName, Length
      # Upload the two installer exes as CI artifacts (downloadable from the Actions tab).
      - name: Upload executables
        uses: actions/upload-artifact@v4
        with:
          name: windows-executables
          path: |
            release/**/*.exe
          if-no-files-found: error
