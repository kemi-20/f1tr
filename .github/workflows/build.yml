name: Build & Package

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Quick checks on every push/PR ──
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Tests
        run: npm test
      - name: Build (vite)
        run: npm run build

  # ── Windows packaging + release ──
  package-windows:
    needs: check
    runs-on: windows-latest
    # Only package on tags, manual, or main pushes (skip PR-only runs to save minutes)
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck

      # electron-builder publishes to a GitHub Release automatically when on a tag.
      # On non-tag pushes it just builds (publish skipped), and we upload artifacts below.
      - name: Build & package Windows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:win

      - name: List built executables
        shell: pwsh
        run: Get-ChildItem -Recurse release -Filter "*.exe" | Select-Object FullName, Length

      # Upload EVERY .exe under release/ (names contain spaces + version, so use a recursive glob)
      - name: Upload executables
        uses: actions/upload-artifact@v4
        with:
          name: windows-executables
          path: |
            release/**/*.exe
          if-no-files-found: error

      # belt-and-suspenders: if electron-builder's own publisher didn't fire (e.g. not on a tag),
      # this still creates a release when on a tag. No-op otherwise.
      - name: Create GitHub Release with executables (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/**/*.exe
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
